<!doctype html>
<html lang="en">
  <head>
    {{> head }}
  </head>
  <body>
    {{> top-bar }}

    <main class="marketing-page">
      <section class="marketing-section auth-section">
        <div class="auth-card">
          <div class="auth-tabs" role="tablist">
            <button
              type="button"
              class="auth-tab active"
              data-mode="sign-in"
              role="tab"
              aria-selected="true"
            >
              Sign in
            </button>
            <button
              type="button"
              class="auth-tab"
              data-mode="sign-up"
              role="tab"
              aria-selected="false"
            >
              Create account
            </button>
          </div>

          <form id="auth-form" class="auth-form" novalidate>
            <label class="auth-label" for="auth-email">Email</label>
            <input
              id="auth-email"
              type="email"
              autocomplete="email"
              required
              class="auth-input"
            />

            <label class="auth-label" for="auth-password">Password</label>
            <input
              id="auth-password"
              type="password"
              autocomplete="current-password"
              required
              minlength="6"
              class="auth-input"
            />

            <p
              id="auth-error"
              class="auth-error"
              role="alert"
              aria-live="polite"
            ></p>

            <button id="auth-submit" type="submit" class="auth-submit">
              Sign in
            </button>
          </form>

          <div class="auth-divider"><span>or</span></div>

          <button id="auth-google" type="button" class="auth-google">
            <i class="fa-brands fa-google"></i>
            Continue with Google
          </button>
        </div>
      </section>
    </main>

    <script type="module" src="./js/entries/sign-in.js"></script>
  </body>
</html>
